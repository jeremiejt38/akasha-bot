services:
  bot:
    build: .
    container_name: multibridge-bot
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - multibridge-net

  # WhatsApp bridge (Node + whatsapp-web.js)
  whatsapp:
    build: ./node_whatsapp
    container_name: bridge-whatsapp
    volumes:
      - ./node_whatsapp/session:/app/session
      - ./data/tmp:/tmp
    networks:
      - multibridge-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  multibridge-net:
