services:
  bot:
    build: .
    container_name: multibridge-bot
    hostname: bot
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    networks:
      - plex-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.bot.rule=Host(`bot.akasha.ing`)
      - traefik.http.routers.bot.entrypoints=http,https
      - traefik.http.routers.bot.service=bot
      - traefik.http.services.bot.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on:
      - whatsapp

  # WhatsApp bridge (Node + whatsapp-web.js)
  whatsapp:
    build: ./node_whatsapp
    container_name: bridge-whatsapp
    hostname: whatsapp
    environment:
      - WA_JS_HEAP_MB=1024
    volumes:
      - ./node_whatsapp/session:/app/session
      - ./data/tmp:/tmp
    networks:
      - plex-backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M

networks:
  plex-backend:
    external: true
