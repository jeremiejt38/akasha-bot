services:
  bot:
    build: .
    container_name: multibridge-bot
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - multibridge-net
      - plex-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.bot.rule=Host(`bot.akasha.ing`)
      - traefik.http.routers.bot.entrypoints=http,https
      - traefik.http.routers.bot.service=bot
      - traefik.http.services.bot.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # WhatsApp bridge (Node + whatsapp-web.js)
  whatsapp:
    build: ./node_whatsapp
    container_name: bridge-whatsapp
    volumes:
      - ./node_whatsapp/session:/app/session
      - ./data/tmp:/tmp
    networks:
      - multibridge-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  multibridge-net:
  plex-backend:
    external: true
