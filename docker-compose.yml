services:
  bot:
    build: .
    container_name: multibridge-bot
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - multibridge-net
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.bot.rule=Host(`bot.akasha.ing`)
      - traefik.http.routers.bot.entrypoints=http,https
      - traefik.http.routers.bot.tls.certresolver=letsencrypt
      - traefik.http.services.bot.loadbalancer.server.port=8000

  # WhatsApp bridge (Node + whatsapp-web.js)
  whatsapp:
    build: ./node_whatsapp
    container_name: bridge-whatsapp
    volumes:
      - ./node_whatsapp/session:/app/session
      - ./data/tmp:/tmp
    networks:
      - multibridge-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  multibridge-net:
  traefik:
    external: true
